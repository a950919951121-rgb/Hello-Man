<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>合併排序法視覺化 - 華麗版</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: #fff; min-height: 100vh; margin: 0;
        }
        .section { 
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 900px; margin-bottom: 25px; 
            text-align: center;
        }
        h1 { border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 10px; letter-spacing: 2px; }
        .array-container { 
            display: flex; align-items: flex-end; justify-content: center;
            height: 250px; margin: 30px 0; padding: 10px;
            background: rgba(0,0,0,0.2); border-radius: 10px;
        }
        .bar { 
            width: 35px; margin: 0 5px; 
            background: linear-gradient(to top, #ff9a9e 0%, #fad0c4 100%); 
            color: #333; text-align: center; border-radius: 5px 5px 0 0; 
            transition: transform 0.2s, background 0.2s; 
            font-size: 0.8rem; font-weight: bold; 
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px;
        }
        .bar.comparing { background: #fbc2eb !important; transform: scale(1.1); }
        .bar.sorted { background: #a18cd1 !important; }
        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        button { 
            padding: 10px 25px; cursor: pointer; background: #fff; color: #764ba2; 
            border: none; border-radius: 20px; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #eee; transform: translateY(-2px); }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .nav-links { margin-top: 20px; }
        .nav-links a { text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="section">
        <h1>Merge Sort 可視化動畫</h1>
        <div class="array-container" id="container"></div>
        <div class="controls">
            <button id="startBtn">開始合併排序</button>
            <button id="resetBtn">重設陣列</button>
        </div>
        <div class="nav-links">
            <a href="home.html"><button>回首頁</button></a>
            <a href="bubble-sort.html"><button>氣泡排序</button></a>
        </div>
    </div>
    <script>
        const container = document.getElementById('container');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        let array = [];

        // 初始化陣列
        function resetArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                array.push(Math.floor(Math.random() * 90) + 10);
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${array[i] * 2}px`;
                bar.textContent = array[i];
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        // 延遲函數
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 更新畫面
        function updateBars(arr, colorIndices = [], isSorted = false) {
            const bars = document.querySelectorAll('.bar');
            arr.forEach((val, i) => {
                bars[i].style.height = `${val * 2}px`;
                bars[i].textContent = val;
                bars[i].classList.remove('comparing', 'sorted');
                if (colorIndices.includes(i)) bars[i].classList.add('comparing');
                if (isSorted) bars[i].classList.add('sorted');
            });
        }

        // 合併排序核心
        async function mergeSort(arr, start, end) {
            if (start >= end) return;
            const mid = Math.floor((start + end) / 2);
            await mergeSort(arr, start, mid);
            await mergeSort(arr, mid + 1, end);
            await merge(arr, start, mid, end);
        }

        async function merge(arr, start, mid, end) {
            let temp = [];

            while (i <= mid && j <= end) {

                    // 綁定按鈕事件
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            resetBtn.disabled = true;
            await mergeSort(array, 0, array.length - 1);
            updateBars(array, [], true); // 完成後變色
            resetBtn.disabled = false;
        });

        resetBtn.addEventListener('click', resetArray);

        // 網頁載入時先執行一次初始化
        resetArray();
    </script>
</body>
</html>

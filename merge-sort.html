<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>合併排序法視覺化 - 華麗版</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: #fff; min-height: 100vh; margin: 0;
        }
        .section { 
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 900px; margin-bottom: 25px; 
        }
        h1, h2 { border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 10px; text-align: center; }
        .array-container { 
            display: flex; align-items: flex-end; justify-content: center; height: 250px; 
            margin: 30px 0; border-bottom: 2px solid #fff; 
        }
        .bar { 
            width: 30px; margin: 0 4px; background: linear-gradient(to top, #4facfe 0%, #00f2fe 100%); 
            color: #333; text-align: center; border-radius: 5px 5px 0 0; 
            transition: height 0.3s, background 0.2s; font-size: 0.8rem; font-weight: bold;
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px;
        }
        .footer-nav { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="section">
        <h1>Merge Sort 可視化說明</h1>
        <p>合併排序法採用「分而治之」策略。先將陣列拆解成最小單位，再將小陣列兩兩合併並排序，最終組成完整的有序陣列。</p>
    </div>

    <div class="section">
        <div class="array-container" id="array-container"></div>
        <div class="controls">
            <button id="start-btn">開始合併排序</button>
            <button id="reset-btn">重新隨機陣列</button>
        </div>
        <div class="footer-nav">
            <a href="home.html"><button>回主頁面</button></a>
            <a href="quick-sort.html"><button>前往快速排序</button></a>
        </div>
    </div>
    <script>
        const container = document.getElementById('array-container');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        let array = [];

        // 初始化：產生隨機陣列與長條圖
        function initArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const val = Math.floor(Math.random() * 85) + 10;
                array.push(val);
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.5}px`;
                bar.textContent = val;
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // 更新 UI：控制顏色 (紅色=比較, 黃色=合併中, 綠色=完成)
        async function updateUI(arr, comparingIdx = [], mergingIdx = [], isDone = false) {
            const bars = document.querySelectorAll('.bar');
            arr.forEach((val, i) => {
                bars[i].style.height = `${val * 2.5}px`;
                bars[i].textContent = val;
                bars[i].classList.remove('comparing', 'merging', 'sorted');
                
                // 動態添加對應的樣式類別
                if (comparingIdx.includes(i)) {
                    bars[i].style.background = '#ff0844'; // 紅色
                } else if (mergingIdx.includes(i)) {
                    bars[i].style.background = '#f9d423'; // 黃色
                } else if (isDone) {
                    bars[i].style.background = '#66ff00'; // 綠色
                } else {
                    bars[i].style.background = 'linear-gradient(to top, #4facfe 0%, #00f2fe 100%)';
                }
            });
        }

        // 合併排序核心遞迴
        async function mergeSort(arr, l, r) {
            if (l >= r) return;
            const m = Math.floor((l + r) / 2);
            await mergeSort(arr, l, m);
            await mergeSort(arr, m + 1, r);
            await merge(arr, l, m, r);
        }

        // 合併兩個子陣列的邏輯
        async function merge(arr, l, m, r) {
            let leftPart = arr.slice(l, m + 1);
            let rightPart = arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;

            while (i < leftPart.length && j < rightPart.length) {
                // 標記比較中 (紅色)
                await updateUI(arr, [l + i, m + 1 + j]);
                await sleep(400);

                if (leftPart[i] <= rightPart[j]) {
                    arr[k] = leftPart[i++];
                } else {
                    arr[k] = rightPart[j++];
                }
                // 標記合併寫回中 (黃色)
                await updateUI(arr, [], [k]);
                await sleep(200);
                k++;
            }

            while (i < leftPart.length) {
                arr[k] = leftPart[i++];
                await updateUI(arr, [], [k]);
                await sleep(150);
                k++;
            }
            while (j < rightPart.length) {
                arr[k] = rightPart[j++];
                await updateUI(arr, [], [k]);
                await sleep(150);
                k++;
            }
        }

        // 按鈕監聽
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            resetBtn.disabled = true;
            
            let tempArray = [...array];
            await mergeSort(tempArray, 0, tempArray.length - 1);
            
            // 排序結束，全部顯示綠色
            await updateUI(tempArray, [], [], true);
            resetBtn.disabled = false;
        });

        resetBtn.addEventListener('click', initArray);

        // 頁面載入時執行
        initArray();
    </script>
</body>
</html>

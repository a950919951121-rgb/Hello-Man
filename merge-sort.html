<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>合併排序法視覺化 - 華麗版</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: #fff; min-height: 100vh; margin: 0;
        }
        .section { 
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 900px; margin-bottom: 25px; 
        }
        h1, h2 { border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 10px; text-align: center; }
        .array-container { 
            display: flex; align-items: flex-end; justify-content: center; height: 250px; 
            margin: 30px 0; border-bottom: 2px solid #fff; 
        }
        .bar { 
            width: 30px; margin: 0 4px; background: linear-gradient(to top, #4facfe 0%, #00f2fe 100%); 
            color: #333; text-align: center; border-radius: 5px 5px 0 0;
            <script>
        const container = document.getElementById('array-container');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        let array = [];

        // 初始化隨機陣列
        function initArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const val = Math.floor(Math.random() * 80) + 15;
                array.push(val);
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.5}px`;
                bar.textContent = val;
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // 更新長條圖視覺狀態
        async function updateUI(currentArr, comparingIdx = [], mergingIdx = [], isDone = false) {
            const bars = document.querySelectorAll('.bar');
            currentArr.forEach((val, i) => {
                bars[i].style.height = `${val * 2.5}px`;
                bars[i].textContent = val;
                bars[i].classList.remove('comparing', 'merging', 'sorted');
                
                if (comparingIdx.includes(i)) bars[i].classList.add('comparing');
                if (mergingIdx.includes(i)) bars[i].classList.add('merging');
                if (isDone) bars[i].classList.add('sorted');
            });
        }

        // 合併排序遞迴函數
        async function mergeSort(arr, l, r) {
            if (l >= r) return;
            const m = Math.floor((l + r) / 2);
            await mergeSort(arr, l, m);
            await mergeSort(arr, m + 1, r);
            await merge(arr, l, m, r);
        }

        async function merge(arr, l, m, r) {
            let leftPart = arr.slice(l, m + 1);
            let rightPart = arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;

            while (i < leftPart.length && j < rightPart.length
            // 綁定按鈕動作
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            resetBtn.disabled = true;
            
            // 複製一份陣列來進行排序，避免直接修改原始參考
            let tempArray = [...array];
            await mergeSort(tempArray, 0, tempArray.length - 1);
            
            // 排序完成，全部變綠色
            await updateUI(tempArray, [], [], true);
            
            resetBtn.disabled = false;
        });

        resetBtn.addEventListener('click', () => {
            initArray();
        });

        // 初始載入
        initArray();
    </script>
</body>
</html>

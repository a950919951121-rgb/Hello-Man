<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>排序演算法報告 - 亮麗選單</title>
    <style>
        /* 1. 設置亮色漸層背景 & 置中對齊 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* 現代字體 */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* 垂直置中 */
            min-height: 100vh; /* 確保佔滿視窗高度 */
            margin: 0;
            /* 亮藍色到白色的清爽漸層 */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #333; /* 文字使用深灰色，保持閱讀清晰 */
        }

        /* 2. 設置全白、高透光的毛玻璃容器 */
        .container { 
            background: rgba(255, 255, 255, 0.4); /* 較亮、更透明的白 */
            padding: 40px 50px; 
            border-radius: 20px; /* 圓潤的角 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* 輕盈的陰影 */
            backdrop-filter: blur(15px); /* 毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(15px); /* 兼容 Safari */
            border: 1px solid rgba(255, 255, 255, 0.6); /* 更明亮的細邊框 */
            text-align: center; 
            width: 90%;
            max-width: 450px; /* 限制最大寬度 */
        }

        /* 3. 標題樣式 */
        h1 { 
            color: #1e88e5; /* 亮藍色標題 */
            margin-top: 0;
            margin-bottom: 35px; 
            font-size: 2.2rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1); /* 輕微的文字陰影 */
        }

        /* 4. 按鈕連結容器 */
        .links { 
            display: flex; 
            flex-direction: column; 
            gap: 18px; /* 按鈕間距 */
        }

        /* 5. 亮麗版按鈕樣式 */
        .links a { 
            display: block; 
            padding: 15px 25px; 
            text-decoration: none; 
            color: #fff; /* 白色文字 */
            background-color: #42a5f5; /* 亮藍色背景 */
            border-radius: 30px; /* 膠囊形狀圓角 */
            font-size: 1.15rem; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* 按鈕陰影 */
            transition: all 0.3s ease; /* 所有的過渡效果 */
        }

        /* 6. 按鈕懸停(Hover)特效 */
        .links a:hover { 
            background-color: #2196f3; /* 懸停時變深藍色 */
            transform: translateY(-3px) scale(1.03); /* 向上浮動並微幅放大 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); /* 陰影變深 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>排序演算法報告</h1>
        
        <div class="links">
            <a href="bubble-sort.html">前往氣泡排序頁面</a>
            <a href="selection-sort.html">前往選擇排序頁面</a>
            <a href="insertion-sort.html">前往插入排序頁面</a>
            <a href="merge-sort.html">前往合併排序頁面</a>
            <a href="quick-sort.html">前往快速排序頁面</a>
        </div>
    </div>

</body>
</html>

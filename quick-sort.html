<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>快速排序分析 - 亮麗版</title>
    <style>
        /* 1. 設置亮色漸層背景 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            color: #333; min-height: 100vh; margin: 0;
        }

        /* 2. 亮色毛玻璃質感區塊 */
        .section { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            width: 90%; max-width: 900px; margin-bottom: 25px; 
        }

        h1, h2 { color: #1e88e5; border-bottom: 2px solid rgba(30, 136, 229, 0.3); padding-bottom: 10px; }
        p, li { line-height: 1.6; }

        /* 程式碼區塊 */
        pre { 
            background: #2c3e50; padding: 15px; border-radius: 8px; 
            color: #ecf0f1; overflow-x: auto; font-size: 0.9rem; line-height: 1.5;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(255,255,255,0.3); }
        th, td { border: 1px solid rgba(0,0,0,0.1); padding: 12px; text-align: left; }
        th { background: rgba(30, 136, 229, 0.1); color: #1e88e5; }
        
        /* 視覺化區域樣式 */
        .array-container { 
            display: flex; align-items: flex-end; justify-content: center; height: 200px; 
            margin: 20px 0; border-bottom: 2px solid #1e88e5; 
        }
        .bar { 
            width: 28px; margin: 0 3px; 
            background: linear-gradient(to top, #42a5f5 0%, #90caf9 100%); 
            color: #fff; text-align: center; border-radius: 5px 5px 0 0; 
            font-size: 0.8rem; font-weight: bold; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px;
            transition: height 0.3s, background 0.2s;
        }
        
        .controls { text-align: center; margin-bottom: 20px; }
        button { 
            padding: 10px 20px; cursor: pointer; 
            background: #1e88e5; color: #fff; 
            border: none; border-radius: 20px; font-weight: bold; transition: 0.3s; margin: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: #1565c0; transform: scale(1.05); }
        button:disabled { background: #bbb; cursor: not-allowed; }

        .footer-nav { 
            border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px; 
            display: flex; justify-content: center; gap: 15px; 
        }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="section">
        <h1>快速排序法 (Quick Sort) 分析</h1>
        <h2>1. 操作原理</h2>
        <p>快速排序法使用「基準點 (Pivot)」的概念進行分段排序：</p>
        <ul>
            <li><strong>選擇基準：</strong>選取一個元素作為 Pivot。</li>
            <li><strong>分割：</strong>將陣列重新排列，小的在左，大的在右。</li>
            <li><strong>遞迴：</strong>對左右兩邊重複執行直到完成。</li>
        </ul>
    </div>

    <div class="section">
        <h2>2. 複雜度分析</h2>
        <table>
            <tr><th>情況</th><th>時間複雜度</th></tr>
            <tr><td>最佳情況 (Best Case)</td><td>O(n log n)</td></tr>
            <tr><td>平均情況 (Average Case)</td><td>O(n log n)</td></tr>
            <tr><td>最壞情況 (Worst Case)</td><td>O(n²)</td></tr>
        </table>
    </div>

    <div class="section">
        <h2>3. 視覺化演示</h2>
        <div class="array-container" id="array-container"></div>
        <div class="controls">
            <button id="start-btn">開始演示</button>
            <button id="reset-btn">隨機重設</button>
        </div>

        <div class="footer-nav">
            <a href="index.html"><button>回主頁面</button></a>
            <a href="bubble-sort.html"><button>前往氣泡排序</button></a>
        </div>
    </div>

    <script>
        const container = document.getElementById('array-container');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        let array = [];

        function initArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const val = Math.floor(Math.random() * 75) + 15;
                array.push(val);
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.2}px`;
                bar.textContent = val;
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function updateUI(arr, pivotIdx = -1, comparingIdx = [], sortedIdxs = []) {
            const bars = document.querySelectorAll('.bar');
            arr.forEach((val, i) => {
                bars[i].style.height = `${val * 2.2}px`;
                bars[i].textContent = val;
                
                if (i === pivotIdx) {
                    bars[i].style.background = '#ffd54f'; // 基準點：鮮黃色
                } else if (comparingIdx.includes(i)) {
                    bars[i].style.background = '#ff5252'; // 比較中：鮮紅色
                } else if (sortedIdxs.includes(i)) {
                    bars[i].style.background = '#4caf50'; // 已排序：鮮綠色
                } else {
                    bars[i].style.background = 'linear-gradient(to top, #42a5f5 0%, #90caf9 100%)';
                }
            });
        }

        async function partition(arr, low, high) {
            let pivot = arr[high];
            let i = low - 1;
            await updateUI(arr, high);
            await sleep(400);

            for (let j = low; j < high; j++) {
                await updateUI(arr, high, [j, i > -1 ? i : low]);
                await sleep(250);
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    await updateUI(arr, high, [i, j]);
                    await sleep(250);
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            await updateUI(arr, i + 1);
            await sleep(400);
            return i + 1;
        }

        async function quickSort(arr, low, high) {
            if (low < high) {
                let p = await partition(arr, low, high);
                await quickSort(arr, low, p - 1);
                await quickSort(arr, p + 1, high);
            }
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            resetBtn.disabled = true;
            await quickSort(array, 0, array.length - 1);
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => bar.style.background = '#4caf50');
            resetBtn.disabled = false;
        });

        resetBtn.addEventListener('click', initArray);
        initArray();
    </script>
</body>
</html>

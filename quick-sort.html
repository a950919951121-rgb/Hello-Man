<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>快速排序法視覺化 - 華麗版</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: #fff; min-height: 100vh; margin: 0;
        }
        .section { 
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 900px; margin-bottom: 25px; 
        }
        h1, h2 { border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 10px; text-align: center; }
        .array-container { 
            display: flex; align-items: flex-end; justify-content: center; height: 250px; 
            margin: 30px 0; border-bottom: 2px solid #fff; 
        }
        .bar { 
            width: 30px; margin: 0 4px; background: linear-gradient(to top, #4facfe 0%, #00f2fe 100%); 
            color: #333; text-align: center; border-radius: 5px 5px 0 0; 
            transition: height 0.3s, background 0.2s; font-size: 0.8rem; font-weight: bold;
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px;
        }
        /* 動畫顏色定義 */
        .bar.pivot { background: #f9d423 !important; transform: scale(1.1); } /* 基準點：黃色 */
        .bar.comparing { background: #ff0844 !important; } /* 正在比較：紅色 */
        .bar.sorted { background: #66ff00 !important; }    /* 已排序：綠色 */
        
        .controls { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        button { 
            padding: 12px 25px; cursor: pointer; background: #fff; color: #1e3c72; 
            border: none; border-radius: 25px; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #ddd; transform: scale(1.05); }
        button:disabled { background: #777; cursor: not-allowed; }
        .footer-nav { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="section">
        <h1>Quick Sort 可視化說明</h1>
        <p>快速排序法使用「基準點 (Pivot)」的概念，將陣列分成比基準小和比基準大的兩部分，再遞迴處理。它是平均速度最快的排序法之一。</p>
    </div>

    <div class="section">
        <div class="array-container" id="array-container"></div>
        <div class="controls">
            <button id="start-btn">開始快速排序</button>
            <button id="reset-btn">重新隨機陣列</button>
        </div>
        <div class="footer-nav">
            <a href="home.html"><button>回主頁面</button></a>
            <a href="merge-sort.html"><button>前往合併排序</button></a>
        </div>
    </div>
    <script>
        const container = document.getElementById('array-container');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        let array = [];

        // 初始化隨機陣列
        function initArray() {
            array = [];
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const val = Math.floor(Math.random() * 80) + 15;
                array.push(val);
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.5}px`;
                bar.textContent = val;
                container.appendChild(bar);
            }
            startBtn.disabled = false;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // 更新畫面視覺狀態
        async function updateUI(arr, pivotIdx = -1, comparingIdx = [], sortedIdxs = []) {
            const bars = document.querySelectorAll('.bar');
            arr.forEach((val, i) => {
                bars[i].style.height = `${val * 2.5}px`;
                bars[i].textContent = val;
                bars[i].classList.remove('pivot', 'comparing', 'sorted');
                
                if (i === pivotIdx) bars[i].classList.add('pivot');
                if (comparingIdx.includes(i)) bars[i].classList.add('comparing');
                if (sortedIdxs.includes(i)) bars[i].classList.add('sorted');
            });
        }

        // 快速排序遞迴函數
        async function quickSort(arr, low, high) {
            if (low < high) {
                let pivotFinalIndex = await partition(arr, low, high);
                await quickSort(arr, low, pivotFinalIndex - 1);
                await quickSort(arr, pivotFinalIndex + 1, high);
            } else if (low === high) {
                // 單個元素也標記為已排序
                await updateUI(arr, -1, [], getSortedIndices(arr.length));
            }
        }

        // 分割函數 (Partition)
        async function partition(arr, low, high) {
            let pivot = arr[high]; // 選擇最後一個作為基準點
            let i = low - 1;

            // 標示基準點 (黃色)
            await updateUI(arr, high);
            await sleep(500);

            for (let j = low; j < high; j++) {
                // 標示正在比較的值 (紅色)
                await updateUI(arr, high, [j, i > -1 ? i : low]);
                await sleep(300);

                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    await updateUI(arr, high, [i, j]);
                    await sleep(300);
                }
            }
            // 將基準點換到正確位置
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            await updateUI(arr, i + 1);
            await sleep(500);
            
            return i + 1;
        }

        // 輔助：獲取所有已完成排序的索引（簡單展示用）
        function getSortedIndices(len) {
            let indices = [];
            for(let i=0; i<len; i++) indices.push(i);
            return indices;
        }

        // 綁定按鈕
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            resetBtn.disabled = true;
            
            await quickSort(array, 0, array.length - 1);
            
            // 最後全部變綠色
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => bar.classList.add('sorted'));
            
            resetBtn.disabled = false;
        });

        resetBtn.addEventListener('click', () => {
            initArray();
        });

        // 初始執行
        initArray();
    </script>
</body>
</html>
